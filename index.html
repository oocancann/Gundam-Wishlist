<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gunpla Compare</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="app-header">
    <div class="header-container">
      <h1>Gunpla Compare</h1>
      <div class="meta-chips">
        <span id="rateChip" class="chip"></span>
        <span id="updatedChip" class="chip"></span>
      </div>
    </div>
    
    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="ค้นหาตามชื่อ หรือ ซีรีส์...">
      
      <div id="gradeFilters" class="grade-filters">
        <button class="grade-chip is-active" data-grade="ALL">All</button>
        <button class="grade-chip" data-grade="PG">PG</button>
        <button class="grade-chip" data-grade="RG">RG</button>
        <button class="grade-chip" data-grade="MEGA SIZE">Mega Size</button>
      </div>

      <select id="sortSelect">
        <option value="name-asc">ชื่อ (A-Z)</option>
        <option value="price-asc">ราคา (ต่ำ-สูง)</option>
        <option value="price-desc">ราคา (สูง-ต่ำ)</option>
        <option value="height-asc">ความสูง (ต่ำ-สูง)</option>
        <option value="height-desc">ความสูง (สูง-ต่ำ)</option>
        <option value="year-desc">ปีใหม่ล่าสุด</option>
      </select>
    </div>
  </header>

  <main class="container">
    <section id="catalogGrid" class="catalog-grid"></section>
  </main>

  <div id="compareBar" class="compare-bar">
    <div class="compare-bar-content">
      <span id="selectedCount">เลือกแล้ว 0 ตัว</span>
      <div class="compare-actions">
        <button id="clearSelection" class="btn-secondary">ล้างทั้งหมด</button>
        <button id="openCompareBtn" class="btn-primary" disabled>เปรียบเทียบตอนนี้ (<span id="compareBarCount">0</span>)</button>
      </div>
    </div>
  </div>

  <div id="compareOverlay" class="compare-overlay">
    <div class="compare-modal">
      <header class="modal-header">
        <h2>เปรียบเทียบรุ่น Gunpla</h2>
        <button id="closeCompareBtn" class="close-btn" aria-label="ปิด">✕</button>
      </header>
      <div id="compareTableWrap" class="compare-table-wrap">
        </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
